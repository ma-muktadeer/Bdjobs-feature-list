@defer (on idle) {
<owl-carousel-o [options]="customOptions" #owlCarousel>
    @for (slide of slidesStore; track $index) {
    <ng-template carouselSlide [id]="slide.id.toString()" [dotContent]="'Slide ' + ($index + 1)">
        <div class="px-0 flex justify-center items-center overflow-visible group/card relative h-full min-h-[252px] w-full"
            (mouseenter)="onHoverStart(true)" (mouseleave)="onHoverStart(false)" (click)="toggleExpand(slide)">
            <div
                class="feature-card invisible w-full !border-transparent !shadow-none !bg-transparent opacity-0 pointer-events-none">
                <div class="w-full flex justify-center items-center">
                    <img src="images/{{slide.image}}" class="w-full h-auto object-contain" alt="" />
                </div>
                <div class="flex flex-col gap-3 w-full">
                    <div class="flex items-center">
                        <div class="w-6 h-6 mr-2 flex-shrink-0"></div>
                        <div class="font-bold text-[16px] text-[#222]">{{slide.title}}</div>
                    </div>
                    <div class="w-full">
                        <p class="line-clamp-4 text-[14px] leading-relaxed m-0">{{slide.description}}</p>
                    </div>
                </div>
            </div>

            <div class="feature-card absolute top-1/2 left-1 right-1 -translate-y-1/2 mx-auto w-[calc(100%-8px)] 
                origin-center transition-all duration-30 md:group-hover/card:scale-[1.15] hover:scale-[1.05] 
                group-hover/card:shadow-[0_15px_35px_rgba(0,0,0,0.15)] group-hover/card:z-[999999]">
                <div class="w-full flex justify-center items-center">
                    <img src="images/{{slide.image}}" class="w-full h-auto object-contain" alt="" />
                </div>
                <div class="flex flex-col gap-3 w-full">
                    <div class="flex items-center">
                        <div class="w-6 h-6 mr-2 flex-shrink-0">
                            <img src="icons/{{slide.icon}}" class="w-full h-full object-contain" alt="" />
                        </div>
                        <div class="font-bold text-[16px] md:text-[18px] text-[#222]">{{slide.title}}</div>
                    </div>
                    <!-- <div class="overflow-hidden transition-[max-height] duration-500 ease-in-out
                            {{slide.isExpanded ? 'max-h-[500px]' : 'max-h-[92px] md:group-hover/card:max-h-[500px]'}}">
                        <p
                            class="text-[#595959] font-normal text-[14px] leading-[23px] m-0 text-left
                            {{slide.isExpanded ? 'line-clamp-none' : 'line-clamp-4 md:group-hover/card:line-clamp-none'}}">
                            {{slide.description}}
                        </p>
                    </div> -->
                    <div class="overflow-hidden transition-[max-height] duration-500 ease-in-out">
                        <p
                            class="text-[#595959] font-normal text-[14px] leading-[23px] m-0 text-left 
                            {{slide.isExpanded ? 'line-clamp-none' : 'line-clamp-4 md:group-hover/card:line-clamp-none'}}">
                            {{slide.description}}
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </ng-template>
    }
</owl-carousel-o>

<button (click)="owlCarousel.prev()"
    class="hidden custom-nav-btn md:flex absolute top-1/2 -translate-y-1/2 z-10 -left-6 bg-white p-2 rounded-full shadow-md hover:bg-gray-100 w-10 h-10 items-center justify-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
</button>

<!-- Next Button -->
<button (click)="owlCarousel.next()"
    class="hidden custom-nav-btn md:flex absolute top-1/2 -translate-y-1/2 z-10 -right-6 bg-white p-2 rounded-full shadow-md hover:bg-gray-100 w-10 h-10 items-center justify-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>
</button>
}
